name: Setup
description: Install pnpm, Node.js, and dependencies

inputs:
  registry-url:
    description: Registry URL for publishing
    required: false
  node-version:
    description: Node.js version to install
    required: false
    default: "24"

runs:
  using: composite
  steps:
    - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8

    - uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6.2.0
      with:
        node-version: ${{ inputs.node-version }}
        cache: pnpm
        registry-url: ${{ inputs.registry-url }}

    - run: pnpm install --frozen-lockfile --ignore-scripts
      shell: bash

    - uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
      with:
        path: .turbo
        key: turbo-${{ runner.os }}-node${{ inputs.node-version }}-${{ hashFiles('turbo.json', '**/pnpm-lock.yaml') }}
        restore-keys: |
          turbo-${{ runner.os }}-node${{ inputs.node-version }}-
