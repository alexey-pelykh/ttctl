name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  ci:
    name: Build, Lint & Test (${{ matrix.os }}, node ${{ matrix.node-version }})
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        # Test against the declared engines.node minimum (22) and the current
        # supported version (24). Loosening engines.node later is safe; tightening
        # is a breaking change for consumers — keep this matrix in sync with the
        # value declared in every package.json's "engines.node" field.
        node-version: ["22", "24"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: ./.github/actions/setup
        with:
          node-version: ${{ matrix.node-version }}
      - run: pnpm format:check
      - run: pnpm build
      - run: pnpm typecheck
      - run: pnpm lint
      - run: pnpm license-check
      - run: pnpm test

  coverage:
    name: Coverage
    # GitHub hard-caps id-token to `read` in fork and Dependabot contexts — that
    # cap is the security boundary; this gate just skips those runs cleanly so
    # their CI stays green. PR leg: pull_request.user.login (not github.actor)
    # keeps the guard stable when a maintainer re-runs a Dependabot PR's
    # workflow. Push leg: actor guard covers `@dependabot merge`-driven pushes,
    # which run id-token-capped; the canary defers to the next human push.
    if: >-
      (github.event_name == 'push' && github.actor != 'dependabot[bot]') ||
      (github.event.pull_request.head.repo.full_name == github.repository &&
       github.event.pull_request.user.login != 'dependabot[bot]')
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # id-token: write — Codecov OIDC upload ONLY (#761; replaces the long-lived
    # CODECOV_TOKEN). Job-scoped so the test matrix never holds token-minting
    # capability. If any second system ever trusts this repo's GitHub OIDC
    # issuer, move that trust to a dedicated workflow per ADR-010.
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: ./.github/actions/setup
        with:
          node-version: "24"
      - run: pnpm build
      # Root-level vitest (not turbo) so the root coverage config applies —
      # flags passed through turbo never reach vitest as options (#760).
      - run: pnpm test:coverage
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          use_oidc: true
          # Pins the CLI the action downloads at runtime. Dependabot bumps the action
          # SHA above but never this input — bump manually when revisiting.
          version: v11.2.8
          fail_ci_if_error: true

  doc-surface:
    name: Doc Surface Attestation
    # PR-only gate: fails if the PR diff touches any of the doc-surface-tracked
    # files (auth/**, config*.ts, transport/**, services/profile/**, codegen
    # config, synthesized schema) without an attestation line in the PR body.
    # Rationale: #225 / prevents recurrence of #107-class doc drift.
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 2
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            // Doc-surface-tracked paths (per #225). Exact paths AND directory
            // prefixes (anything under the prefix triggers the gate).
            const exactPaths = [
              'packages/core/src/config.ts',
              'packages/core/src/configWriter.ts',
              'packages/core/src/configLock.ts',
              'packages/core/src/onepassword.ts',
              'codegen.config.ts',
              'research/graphql/gateway/schema.graphql',
            ];
            const dirPrefixes = [
              'packages/core/src/auth/',
              'packages/core/src/transport/',
              'packages/core/src/services/profile/',
            ];

            const isTracked = (filename) =>
              exactPaths.includes(filename) ||
              dirPrefixes.some((p) => filename.startsWith(p));

            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
              per_page: 100,
            });

            const touched = files
              .map((f) => f.filename)
              .filter(isTracked);

            if (touched.length === 0) {
              core.info('No doc-surface-tracked files touched. Attestation not required.');
              return;
            }

            core.info(`Doc-surface-tracked files touched (${touched.length}):`);
            for (const f of touched) core.info(`  - ${f}`);

            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
            });

            // Strip Markdown emphasis (asterisks, backticks) so the regex
            // tolerates **Doc surface**, `Doc surface`, etc.
            const body = (pr.body || '').replace(/[*`]+/g, '');
            const hasNoDoc = /doc surface\s*:\s*no doc surface affected/i.test(body);
            const hasUpdated = /doc surface\s*:\s*updated\b/i.test(body);

            if (hasNoDoc || hasUpdated) {
              core.info(
                `Doc-surface attestation found ` +
                  `(no-doc=${hasNoDoc}, updated=${hasUpdated}).`,
              );
              return;
            }

            const message = [
              'Doc-surface attestation missing from PR description.',
              '',
              'This PR touches files tracked by the doc-surface gate (see #225):',
              ...touched.map((f) => `  - ${f}`),
              '',
              'Add ONE of the following lines to the PR description:',
              '  **Doc surface**: no doc surface affected by this change',
              '  **Doc surface**: updated <list of doc files>',
              '',
              'Then push a new commit (or use the "Re-run failed jobs" button)',
              'to re-run this check.',
            ].join('\n');
            core.setFailed(message);

  schema-contract-disposition:
    name: Schema/Contract Rule Disposition
    # PR-only gate: fails if the PR diff touches any file in the schema/contract
    # trigger set (CLAUDE.md § Schema/contract validation rule § Code-review
    # checklist) without a disposition marker in the PR body.
    #
    # Trigger set (per CLAUDE.md):
    #   - packages/core/src/auth/** (any file under)
    #   - packages/core/src/services/profile/** (any file under)
    #   - Any new hand-authored GraphQL operation (deferred — file-path
    #     triggers cover the typical sites; hand-authored detection is an
    #     optional refinement per issue #302 AC)
    #
    # Marker forms (case-insensitive, Markdown emphasis tolerated):
    #   Schema/contract rule: triggered — see <e2e-test-path> + transcript ...
    #   Schema/contract rule: NOT triggered — <one-line rationale>
    #
    # Rationale: #302. The rule was load-bearing on real wire-shape bugs in
    # #146 and #275. Author-side discipline alone is insufficient — this
    # gate mechanically enforces what CLAUDE.md prescribes.
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 2
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            // Schema/contract trigger set (per CLAUDE.md § Code-review checklist).
            const exactPaths = [];
            const dirPrefixes = [
              'packages/core/src/auth/',
              'packages/core/src/services/profile/',
            ];

            const isTrigger = (filename) =>
              exactPaths.includes(filename) ||
              dirPrefixes.some((p) => filename.startsWith(p));

            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
              per_page: 100,
            });

            const touched = files
              .map((f) => f.filename)
              .filter(isTrigger);

            if (touched.length === 0) {
              core.info(
                'No schema/contract trigger-set files touched. ' +
                  'Disposition marker not required.',
              );
              return;
            }

            core.info(`Schema/contract trigger-set files touched (${touched.length}):`);
            for (const f of touched) core.info(`  - ${f}`);

            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
            });

            // Strip Markdown emphasis (asterisks, backticks) so the regex
            // tolerates **Schema/contract rule**, `Schema/contract rule`, etc.
            const body = (pr.body || '').replace(/[*`]+/g, '');
            // Check the more-specific NOT-form independently from the bare
            // "triggered" form. The `\s*:\s*triggered` form does not match
            // "Schema/contract rule: NOT triggered" because "NOT " sits
            // between the colon and the word "triggered", so the two
            // patterns are mutually exclusive at the same call site.
            const hasNotTriggered = /schema\/contract rule\s*:\s*not[\s-]triggered\b/i.test(body);
            const hasTriggered = /schema\/contract rule\s*:\s*triggered\b/i.test(body);

            if (hasNotTriggered && hasTriggered) {
              core.setFailed(
                'Both "triggered" and "NOT triggered" Schema/contract rule ' +
                  'markers present in PR body. Pick exactly one disposition.',
              );
              return;
            }

            if (hasNotTriggered) {
              core.info('Schema/contract rule marked as NOT triggered.');
              return;
            }

            if (hasTriggered) {
              // AC #5: marker present with `triggered` but no e2e-test path
              // or transcript reference → WARN (not fail). The warning shows
              // in the check summary and keeps human judgement in the loop.
              const hasEvidence =
                /\.e2e\.test\.ts/i.test(body) || /transcript/i.test(body);
              if (!hasEvidence) {
                core.warning(
                  'Schema/contract rule marked as TRIGGERED, but no e2e-test ' +
                    'path (*.e2e.test.ts) or transcript reference detected in ' +
                    'the PR body. Per CLAUDE.md § Schema/contract validation ' +
                    'rule, add the test path and a transcript link.',
                );
              } else {
                core.info(
                  'Schema/contract rule marked as TRIGGERED with evidence reference.',
                );
              }
              return;
            }

            const message = [
              'Schema/contract rule disposition marker missing from PR description.',
              '',
              'This PR touches files in the schema/contract trigger set ' +
                '(see CLAUDE.md § Code-review checklist):',
              ...touched.map((f) => `  - ${f}`),
              '',
              'Add ONE of the following lines to the PR description:',
              '  **Schema/contract rule**: triggered — see <e2e-test-path> + transcript in <PR comment or link>',
              '  **Schema/contract rule**: NOT triggered — <one-line rationale>',
              '',
              'Then push a new commit (or use the "Re-run failed jobs" button)',
              'to re-run this check.',
            ].join('\n');
            core.setFailed(message);

  ci-gate:
    name: CI
    if: always()
    permissions: {}
    needs:
      - ci
      - coverage
      - doc-surface
      - schema-contract-disposition
    runs-on: ubuntu-latest
    timeout-minutes: 1
    steps:
      - run: |
          if [[ "${{ needs.ci.result }}" != "success" ]]; then
            echo "CI failed: ${{ needs.ci.result }}"
            exit 1
          fi
          # coverage is skipped in fork/Dependabot contexts (id-token capped to read there).
          if [[ "${{ needs.coverage.result }}" != "success" && "${{ needs.coverage.result }}" != "skipped" ]]; then
            echo "coverage failed: ${{ needs.coverage.result }}"
            exit 1
          fi
          # doc-surface is PR-only; on push to main it is skipped (acceptable).
          if [[ "${{ needs.doc-surface.result }}" != "success" && "${{ needs.doc-surface.result }}" != "skipped" ]]; then
            echo "doc-surface failed: ${{ needs.doc-surface.result }}"
            exit 1
          fi
          # schema-contract-disposition is PR-only; on push to main it is skipped (acceptable).
          if [[ "${{ needs.schema-contract-disposition.result }}" != "success" && "${{ needs.schema-contract-disposition.result }}" != "skipped" ]]; then
            echo "schema-contract-disposition failed: ${{ needs.schema-contract-disposition.result }}"
            exit 1
          fi
