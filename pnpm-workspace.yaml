packages:
  - "packages/*"

# Migrated from .npmrc — pnpm 11 only reads auth/registry settings from .npmrc; everything else moves here.
engineStrict: true
autoInstallPeers: true
linkWorkspacePackages: true

# Close fast-uri CVEs via MCP SDK (#223). ^3.1.2 forces re-resolution; ^3.0.0 would let locked 3.1.0 stay.
# Close shell-quote GHSA-w7jw-789q-3m8p (critical) via @graphql-codegen/cli; locked 1.8.3 is vulnerable.
# Bump esbuild to the GHSA-gv7w-rqvm-qjhr patch (>=0.28.1) — dev-only via vitest, not in the shipped tarball;
# a clean patch exists so we upgrade rather than ignore (the release-time `pnpm audit --audit-level=high`
# gate fails on the HIGH otherwise).
# Same gate, same rationale — both dev-only via vitest, clean patches exist:
#   vite >=8.0.16 (GHSA-fx2h-pf6j-xcff), ws >=8.21.0 (GHSA-96hv-2xvq-fx4p).
# Policy: `overrides` for REACHABLE advisories (above); `auditConfig.ignoreGhsas` (below) for
# present-but-UNREACHABLE transitive ones — see ADR-011 (ttctl).
overrides:
  fast-uri: "^3.1.2"
  shell-quote: "^1.8.4"
  esbuild: "^0.28.1"
  vite: "^8.0.16"
  ws: "^8.21.0"

# Audit allowlist (#770) — all 9 are transitive through @modelcontextprotocol/sdk's HTTP/SSE transport
# stack (hono, express, express-rate-limit, qs, ip-address) and require an active HTTP request handler.
# ttctl's MCP server is stdio-only, so they never enter its runtime module graph — present-but-unreachable.
# Pinned per-GHSA (not per-package) so future advisories still surface.
# Posture + re-review triggers: SECURITY.md. Full triage + reachability proof: ADR-011 (ttctl).
auditConfig:
  ignoreGhsas:
    # hono — only via the SDK's HTTP/SSE transport (@hono/node-server); stdio reaches none of it
    - GHSA-qp7p-654g-cw7p # CSS Declaration Injection (JSX SSR)
    - GHSA-p77w-8qqv-26rm # Cache Middleware ignores Vary: Authorization
    - GHSA-xrhx-7g5j-rcj5 # IP Restriction bypass (non-canonical IPv6)
    - GHSA-3hrh-pfw6-9m5x # Cookie helper Set-Cookie injection (sameSite/priority)
    - GHSA-f577-qrjj-4474 # JWT middleware accepts any Authorization scheme
    - GHSA-2gcr-mfcq-wcc3 # app.mount() strips mount prefix (percent-encoded paths)
    - GHSA-hm8q-7f3q-5f36 # JWT verify() improper NumericDate validation (low)
    # ip-address — only via express-rate-limit (the SDK's HTTP rate limiter)
    - GHSA-v2v4-37r5-5v8g # XSS in Address6 HTML-emitting methods
    # qs — only via express > body-parser (the SDK's HTTP body parsing)
    - GHSA-q8mj-m7cp-5q26 # qs.stringify DoS on null/undefined comma-array entries

catalog:
  # Pinned to ~6.0 (patch-only) until typescript-eslint relaxes peer ceiling (<6.1.0 as of 8.59.2)
  typescript: "~6.0.3"
  "@types/node": "^25"
  vitest: "^4.1.9"
  "@vitest/coverage-v8": "^4.1.10"
  "@eslint/js": "^10.0.1"
  eslint: "^10.4.1"
  prettier: "^3.9.5"
  typescript-eslint: "^8.61.1"
  eslint-config-prettier: "^10.1.8"
  "@tony.ganchev/eslint-plugin-header": "^3.3.3"
  "@modelcontextprotocol/sdk": "^1.28.0"
  "@graphql-codegen/cli": "^7.1.3"
  "@graphql-codegen/add": "^7.1.0"
  graphql-codegen-typescript-validation-schema: "^0.19.0"
  graphql: "^17.0.2"
  zod: "^4.4.3"
  commander: "^15.0.0"
  turbo: "^2.9.18"
  typedoc: "^0.28.18"
  "@clack/prompts": "^1.7.0"
  "cli-table3": "^0.6.5"
  yaml: "^2.9.0"
  undici: "^8.5.0"
  "node-wreq": "^2.4.1"
  msw: "^2.10.5"
  "proper-lockfile": "^4.1.2"
  "@types/proper-lockfile": "^4.1.4"
  tsx: "^4.23.0"

allowBuilds:
  esbuild: true

minimumReleaseAgeExclude:
  - "@node-wreq/darwin-arm64@2.4.1"
  - "@node-wreq/darwin-x64@2.4.1"
  - "@node-wreq/linux-arm64-gnu@2.4.1"
  - "@node-wreq/linux-x64-gnu@2.4.1"
  - "@node-wreq/linux-x64-musl@2.4.1"
  - "@node-wreq/win32-x64-msvc@2.4.1"
  - node-wreq@2.4.1
